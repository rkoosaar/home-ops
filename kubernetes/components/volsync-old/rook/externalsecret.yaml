---
# yaml-language-server: $schema=https://my-kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: "${APP}-volsync"
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: "${APP}-volsync-secret"
    template:
      data:
        RESTIC_REPOSITORY: "{{ .REPOSITORY_TEMPLATE }}/${APP}"
        RESTIC_PASSWORD: "{{ .RESTIC_PASSWORD }}"
        AWS_ACCESS_KEY_ID: "{{ .GARAGE_ACCESS_KEY_ID }}"
        AWS_SECRET_ACCESS_KEY: "{{ .GARAGE_SECRET_ACCESS_KEY }}"
  dataFrom:
    - extract:
        key: garage
    - extract:
        key: volsync-garage-template

