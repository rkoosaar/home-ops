machine:
  kubelet:
    extraMounts:
      - destination: /var/mnt/longhorn
        type: bind
        source: /var/mnt/longhorn
        options:
          - bind
          - rshared
          - rw
  disks:
    - device: /dev/disk/by-id/usb-SSK_SSK_Storage_012345678913-0:0
      partitions:
        - mountpoint: /var/mnt/longhorn
