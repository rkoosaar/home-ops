# yaml-language-server: $schema=https://raw.githubusercontent.com/budimanjojo/talhelper/master/pkg/config/schemas/talconfig.json
---
# renovate: datasource=docker depName=ghcr.io/siderolabs/installer
talosVersion: v1.7.6
# renovate: datasource=docker depName=ghcr.io/siderolabs/kubelet
kubernetesVersion: v1.31.1

clusterName: "home-kubernetes"
endpoint: https://10.1.1.30:6443
clusterPodNets:
  - "10.69.0.0/16"
clusterSvcNets:
  - "10.96.0.0/16"
additionalApiServerCertSans: &sans
  - "10.1.1.30"
  - 127.0.0.1 # KubePrism
  - "k8s-api.kvshs.cc"
additionalMachineCertSans: *sans

# Disable built-in Flannel to use Cilium
cniConfig:
  name: none

nodes:
  - hostname: "mango"
    nodeLabels: &nodeLabels
      openebs.io/engine: mayastor
    ipAddress: "10.1.1.31"
    installDisk: "/dev/nvme0n1"
    talosImageURL: factory.talos.dev/installer/87521388a0ade6d1e9e0ae8ed108d529bdb16508c3d8e46d8b8e2636bc366c86
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "00:02:c9:e8:b4:81"
        dhcp: false
        addresses:
          - "10.1.1.31/24"
        routes:
          - network: 0.0.0.0/0
            gateway: "10.1.1.1"
        mtu: 1500
        vip:
          ip: "10.1.1.30"
    patches:
      - "@./patches/mango/longhorn.yaml"
  - hostname: "melon"
    nodeLabels: &nodeLabels
      openebs.io/engine: mayastor
    ipAddress: "10.1.1.32"
    installDisk: "/dev/nvme0n1"
    talosImageURL: factory.talos.dev/installer/87521388a0ade6d1e9e0ae8ed108d529bdb16508c3d8e46d8b8e2636bc366c86
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "00:02:c9:3b:b2:61"
        dhcp: false
        addresses:
          - "10.1.1.32/24"
        routes:
          - network: 0.0.0.0/0
            gateway: "10.1.1.1"
        mtu: 1500
        vip:
          ip: "10.1.1.30"
    patches:
      - "@./patches/melon/longhorn.yaml"
  - hostname: "nectarine"
    nodeLabels: &nodeLabels
      openebs.io/engine: mayastor
    ipAddress: "10.1.1.33"
    installDisk: "/dev/nvme0n1"
    talosImageURL: factory.talos.dev/installer/87521388a0ade6d1e9e0ae8ed108d529bdb16508c3d8e46d8b8e2636bc366c86
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "00:02:c9:3b:b1:41"
        dhcp: false
        addresses:
          - "10.1.1.33/24"
        routes:
          - network: 0.0.0.0/0
            gateway: "10.1.1.1"
        mtu: 1500
        vip:
          ip: "10.1.1.30"
    patches:
      - "@./patches/nectarine/longhorn.yaml"

# Global patches
patches:
  - # Force nameserver
    |-
    machine:
      network:
        nameservers:
          - 10.1.1.1
  - "@./patches/global/cluster-discovery.yaml"
  - "@./patches/global/containerd.yaml"
  - "@./patches/global/disable-search-domain.yaml"
  - "@./patches/global/hostdns.yaml"
  - "@./patches/global/kubelet.yaml"
  - "@./patches/global/openebs-local.yaml"
  - "@./patches/global/sysctl.yaml"

# Controller patches
controlPlane:
  patches:
    - "@./patches/controller/api-access.yaml"
    - "@./patches/controller/cluster.yaml"
    - "@./patches/controller/disable-admission-controller.yaml"
    - "@./patches/controller/etcd.yaml"

