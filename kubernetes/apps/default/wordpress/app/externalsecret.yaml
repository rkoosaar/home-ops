---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: wordpress
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: wordpress-secret
    template:
      engineVersion: v2
      data:
        WORDPRESS_DATABASE_HOST: &dbHost postgres16-rw.database.svc.cluster.local
        WORDPRESS_DATABASE_PORT_NUMBER: "5432"
        WORDPRESS_DATABASE_NAME: &dbName "wordpress"
        WORDPRESS_DATABASE_USER: &dbUser "{{ .WORDPRESS_POSTGRES_USER }}"
        WORDPRESS_DATABASE_PASSWORD: &dbPass "{{ .WORDPRESS_POSTGRES_PASSWORD }}"
        INIT_POSTGRES_DBNAME: *dbName
        INIT_POSTGRES_HOST: *dbHost
        INIT_POSTGRES_USER: *dbUser
        INIT_POSTGRES_PASS: *dbPass
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
  dataFrom:
    - extract:
        key: cloudnative-pg
    - extract:
        key: wordpress
