---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./helmrelease.yaml
  - ./ocirepository.yaml
configMapGenerator:
  - name: bedrockconnect-configmap
    files:
      - custom_servers.json=./resources/custom_servers.json
generatorOptions:
  disableNameSuffixHash: true
