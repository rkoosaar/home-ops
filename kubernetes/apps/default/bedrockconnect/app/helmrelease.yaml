# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bedrockconnect
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      bedrockconnect:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/pugmatt/bedrock-connect
              tag: latest
            env:
              TZ: Europe/London
              CUSTOM_SERVERS: '{"servers":[{"name":"RK Server","address":"10.1.1.47","port":19132}]}'
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
    defaultPodOptions:
      automountServiceAccountToken: false
    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: "10.1.1.48"
        ports:
          bedrock:
            port: 19132
            protocol: UDP
