---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/scrapeconfig_v1alpha1.json
apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  name: &name minio
spec:
  staticConfigs:
    - targets: ["minio.kvshs.xyz"]
  metricsPath: /metrics/minio/v2/metrics/cluster
  scheme: HTTPS
  relabelings:
    - action: replace
      targetLabel: job
      replacement: *name
  authorization:
    credentials:
      name: minio-prometheus-auth-token-secret
      key: "token1"
      #key: "{{ .MINIO_PROMETHEUS_AUTH_TOKEN }}"

