---
# yaml-language-server: $schema=https://my-kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: renovate-operator
spec:
  chartRef:
    kind: OCIRepository
    name: renovate-operator
  interval: 30m
  values:
    fullnameOverride: renovate-operator
    route:
      enabled: true
      hostnames:
        - "{{ .Release.Name }}.${SECRET_DOMAIN}"
      parentRefs:
        - name: envoy-internal
          namespace: network
    webhook:
      enabled: true
